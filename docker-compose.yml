networks:
  clinical-net:
    driver: bridge

volumes:
  qdrant_storage:
  postgres_data:
  clickhouse_data:
  redis_data:
  minio_data:
  ollama_storage:

services:
  # =========================================================================
  # LOCAL SOVEREIGN INFERENCE STACK
  # =========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: local-ollama-engine
    restart: unless-stopped
    ports: ["11434:11434"]
    volumes: [ollama_storage:/root/.ollama]
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=5m
    networks: [clinical-net]
    deploy:
      resources:
        limits:
          memory: 8G
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve & SERVE_PID=$$!
        until ollama list >/dev/null 2>&1; do sleep 2; done
        MODELS="nomic-embed-text aisingapore/Llama-SEA-LION-v3.5-8B-R u1i/LLaMA-3-MERaLiON-8B-Instruct:q4k"
        CURRENT=$$(ollama list | tail -n +2 | awk '{print $$1}')
        for m in $$MODELS; do
          if ! echo "$$CURRENT" | grep -q "$${m%:*}/"; then ollama pull "$$m"; fi
        done
        wait $$SERVE_PID
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20

  data-ingest:
    image: python:3.12-slim
    container_name: clinical-data-ingest
    volumes: [.:/app]
    working_dir: /app
    environment:
      - OLLAMA_HOST=http://local-ollama-engine:11434
      - QDRANT_URL=http://local-qdrant-db:6333
      - QDRANT_API_KEY=sk-qdrant-secure-key-12345
      - FORCE_REINGEST=false
    networks: [clinical-net]
    command: >
      sh -c "pip install --no-cache-dir uv && uv sync && uv run python -m src.ingest"
    depends_on:
      ollama: {condition: service_healthy}
      local-qdrant-db: {condition: service_started}

  # =========================================================================
  # CORE WEB GATEWAY PORTAL
  # Published directly on 8000 — the previous nginx-gateway reverse-proxy
  # layer was removed from this version of the stack, which left NOTHING
  # publishing a port to the host. `expose` only makes a port reachable
  # container-to-container, never from your browser/host machine.
  # =========================================================================
  clinical-coder-api:
    image: python:3.12-slim
    container_name: clinical-coder-api
    shm_size: '4gb'
    restart: always
    ports: ["8000:8050"]
    volumes: [.:/app]
    working_dir: /app
    environment:
      - OLLAMA_HOST=http://local-ollama-engine:11434
      - OLLAMA_API_KEY=sk-ollama-secure-key-12345
      - QDRANT_URL=http://local-qdrant-db:6333
      - QDRANT_API_KEY=sk-qdrant-secure-key-12345
      - LANGFUSE_HOST=http://clinical-langfuse-web:3000
      - LANGFUSE_PUBLIC_KEY=pk-lf-mock
      - LANGFUSE_SECRET_KEY=sk-lf-mock
      # Explicit container-to-container URLs. Without these, main.py's
      # ASSISTANT_AGENT_URL/CODER_AGENT_URL default to 127.0.0.1, which
      # silently triggers its "local dev fallback" mode — spinning up
      # embedded agent servers INSIDE this container instead of routing
      # to the actual dedicated clinical-assistant-agent /
      # clinical-coder-agent containers you're running.
      - ASSISTANT_AGENT_URL=http://clinical-assistant-agent:8003
      - CODER_AGENT_URL=http://clinical-coder-agent:8004
      - RAY_memory_monitor_refresh_ms=0
      - RAY_memory_usage_threshold=1.0
      - RAY_OBJECT_STORE_ALLOW_SLOW_STORAGE=1
    networks: [clinical-net]
    depends_on:
      data-ingest: {condition: service_completed_successfully}
    command: >
      sh -c "pip install --no-cache-dir uv && uv pip install --system -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8050"

  clinical-assistant-agent:
    image: python:3.12-slim
    container_name: clinical-assistant-agent
    restart: always
    expose: ["8003"]
    volumes: [.:/app]
    working_dir: /app
    environment:
      - OLLAMA_HOST=http://local-ollama-engine:11434
      - OLLAMA_API_KEY=sk-ollama-secure-key-12345
      - RAY_memory_monitor_refresh_ms=0
      - RAY_memory_usage_threshold=1.0
    networks: [clinical-net]
    command: >
      sh -c "pip install --no-cache-dir uv && uv pip install --system -r requirements.txt && uvicorn main:assistant_app --host 0.0.0.0 --port 8003"

  clinical-coder-agent:
    image: python:3.12-slim
    container_name: clinical-coder-agent
    restart: always
    expose: ["8004"]
    volumes: [.:/app]
    working_dir: /app
    environment:
      - OLLAMA_HOST=http://local-ollama-engine:11434
      - OLLAMA_API_KEY=sk-ollama-secure-key-12345
      - QDRANT_URL=http://local-qdrant-db:6333
      - QDRANT_API_KEY=sk-qdrant-secure-key-12345
      - RAY_memory_monitor_refresh_ms=0
      - RAY_memory_usage_threshold=1.0
    networks: [clinical-net]
    command: >
      sh -c "pip install --no-cache-dir uv && uv pip install --system -r requirements.txt && uvicorn main:coder_app --host 0.0.0.0 --port 8004"

  # Databases & Telemetry with strict memory limits
  local-qdrant-db:
    image: qdrant/qdrant:latest
    container_name: local-qdrant-db
    restart: unless-stopped
    ports: ["6333:6333"]
    volumes: [qdrant_storage:/qdrant/storage]
    networks: [clinical-net]
    deploy: {resources: {limits: {memory: 512M}}}

  langfuse-postgres:
    image: postgres:16-alpine
    container_name: langfuse-postgres
    restart: always
    environment: [POSTGRES_USER=postgres, POSTGRES_PASSWORD=local_secure_password, POSTGRES_DB=langfuse]
    expose: ["5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    networks: [clinical-net]
    deploy: {resources: {limits: {memory: 512M}}}
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U postgres"], interval: 5s, retries: 5}

  clinical-clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clinical-clickhouse
    restart: always
    environment:
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=clickhouse
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    expose: ["8123"]
    networks: [clinical-net]
    deploy: {resources: {limits: {memory: 512M}}}
    healthcheck: {test: ["CMD", "wget", "--spider", "http://localhost:8123/ping"], interval: 5s, retries: 5}

  clinical-redis:
    image: redis:7-alpine
    container_name: clinical-redis
    restart: always
    command: --requirepass myredissecret
    expose: ["6379"]
    deploy: {resources: {limits: {memory: 256M}}}
    networks: [clinical-net]

  clinical-minio:
    image: minio/minio:latest
    container_name: clinical-minio
    restart: always
    command: server /data --console-address ":9001"
    environment: [MINIO_ROOT_USER=minio, MINIO_ROOT_PASSWORD=miniosecret]
    expose: ["9000"]
    deploy: {resources: {limits: {memory: 512M}}}
    networks: [clinical-net]

  # NOTE: restored NEXTAUTH_SECRET / NEXTAUTH_URL / SALT and the MinIO S3
  # upload variables below — these were present in earlier versions of this
  # stack and are required by Langfuse v3 at startup. Their absence in the
  # most recent compose file is exactly why clinical-langfuse-web was
  # crash-looping ("Restarting (1)") in your last `docker ps` output.
  clinical-langfuse-web:
    image: langfuse/langfuse:3
    container_name: clinical-langfuse-web
    restart: always
    ports: ["3000:3000"]
    environment:
      - DATABASE_URL=postgresql://postgres:local_secure_password@langfuse-postgres:5432/langfuse
      - CLICKHOUSE_URL=http://clinical-clickhouse:8123
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clinical-clickhouse:9000
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=clickhouse
      - REDIS_HOST=clinical-redis
      - REDIS_AUTH=myredissecret
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=my_super_secret_key
      - SALT=my_super_secure_salt
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=minio
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=miniosecret
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://clinical-minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=minio
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=miniosecret
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://clinical-minio:9000
      # deploy.resources.limits below is a Swarm-only construct and is
      # silently ignored by plain `docker compose up` — it was never
      # actually capping this container's memory. The real fix for the
      # "JavaScript heap out of memory" crash is controlling Node's heap
      # directly via NODE_OPTIONS, independent of any Docker-level limit.
      - NODE_OPTIONS=--max-old-space-size=1536
    networks: [clinical-net]
    deploy: {resources: {limits: {memory: 2G}}}
    depends_on:
      langfuse-postgres: {condition: service_healthy}
      clinical-clickhouse: {condition: service_healthy}