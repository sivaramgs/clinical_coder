events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  routing_log  '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status '
                             'Routed-To: "$http_x_target_model"';

    access_log  /var/log/nginx/access.log  routing_log;

    # Docker's embedded DNS resolver — re-resolves container hostnames per
    # request instead of caching a stale IP from container startup.
    resolver 127.0.0.11 valid=10s;
    client_max_body_size 20M;

    server {
        listen 8000;
        server_name localhost;

        # Medical-note portal — proxies to the clinical-coder-api CONTAINER
        # on the Docker network, not host.docker.internal. clinical-coder-api
        # only `expose`s 8050 internally; it isn't published to the host.
        location / {
            set $core_portal_upstream http://clinical-coder-api:8050;
            proxy_pass $core_portal_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Unified LLM Router — Ollama actually runs on the host machine, so
        # this one legitimately targets host.docker.internal.
        location /api/v1/llm/ {
            if ($http_authorization != "Bearer sk-ollama-secure-key-12345") {
                return 401 '{"error": "Unauthorized: Invalid Routing Token"}';
            }
            rewrite ^/api/v1/llm/(.*)$ /$1 break;

            set $llm_upstream http://host.docker.internal:11434;
            proxy_pass $llm_upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }
    }

    # Dedicated internal-only Qdrant proxy (port 8001, not published to host —
    # only clinical-coder-agent / clinical-coder-api reach it via the Docker
    # network at local-nginx-gateway:8001). Qdrant's dashboard itself is
    # reached directly at localhost:6333, published straight from qdrant-db.
    server {
        listen 8001;
        server_name localhost;

        location / {
            if ($http_api_key != "sk-qdrant-secure-key-12345") {
                return 401 '{"error": "Unauthorized: Invalid Qdrant API Key"}';
            }

            set $qdrant_upstream http://local-qdrant-db:6333;
            proxy_pass $qdrant_upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }
    }
}